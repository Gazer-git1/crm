name = "investors-angels-portal"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

# Created with: wrangler d1 create investors-angels-portal-db
# Paste the resulting database_id below.
[[d1_databases]]
binding = "PORTAL_DB"
database_name = "investors-angels-portal-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Created with: wrangler r2 bucket create investors-angels-portal-files
[[r2_buckets]]
binding = "PORTAL_FILES"
bucket_name = "investors-angels-portal-files"

# Secrets (set via `wrangler pages secret put <NAME>`, never commit real values):
#   SESSION_SECRET
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   GOOGLE_REDIRECT_URI
#   WHATSAPP_PHONE_NUMBER_ID
#   WHATSAPP_ACCESS_TOKEN
#   RESEND_API_KEY
#   EMAIL_FROM
