name: Deploy Portal

on:
  push:
    branches: [investor-portal, main]
    paths:
      - "portal/**"
      - ".github/workflows/deploy-portal.yml"
  pull_request:
    paths:
      - "portal/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Ensure R2 bucket exists
        if: github.event_name == 'push' && vars.CLOUDFLARE_READY == 'true'
        run: npx wrangler r2 bucket create investors-angels-portal-files || true
        working-directory: portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Resend email secrets
        if: github.event_name == 'push' && vars.CLOUDFLARE_READY == 'true'
        run: |
          echo "${{ secrets.RESEND_API_KEY }}" | npx wrangler pages secret put RESEND_API_KEY --project-name=investors-angels-portal
          echo "Investors' Angels <onboarding@resend.dev>" | npx wrangler pages secret put EMAIL_FROM --project-name=investors-angels-portal
        working-directory: portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: TEMP diagnose Resend delivery
        if: github.event_name == 'push' && vars.CLOUDFLARE_READY == 'true'
        run: |
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"from":"Investors'"'"' Angels <onboarding@resend.dev>","to":"nick.skorykh@gmail.com","subject":"diag test","html":"<p>diag</p>"}'
          echo
          echo "--- recent users ---"
          npx wrangler d1 execute PORTAL_DB --remote --command="SELECT email, email_verified, created_at FROM users ORDER BY created_at DESC LIMIT 10"
        working-directory: portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && vars.CLOUDFLARE_READY == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: portal
          command: pages deploy dist --project-name=investors-angels-portal
